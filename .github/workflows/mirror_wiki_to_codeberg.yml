name: Mirror Wiki to Codeberg

# 'gollum' is GitHub's special event trigger that fires whenever a Wiki page is created or updated.
# 'workflow_dispatch' allows you to trigger this manually from the GitHub Actions tab.
on: [gollum, workflow_dispatch]

jobs:
  mirror-wiki:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.3 (SHA for supply-chain safety)
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          # Tell checkout to grab the hidden Wiki repository instead of the main code
          repository: richbl/go-ble-sync-cycle.wiki
          fetch-depth: 0

      - name: Replace URLs in Wiki
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Since we checked out the wiki repo, the markdown files are in the root directory,
          # so we just run the search/replace on ALL .md files in the current folder.
          find . -name "*.md" -type f -exec sed -i 's|https://github.com/richbl/go-ble-sync-cycle|https://codeberg.org/richbl/go-ble-sync-cycle|g' {} +
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -a -m "Automated URL replacement for Codeberg Wiki mirror"
            
            # The wiki repo only has a 'master' branch, but we update HEAD just to be safe
            git update-ref refs/heads/master HEAD
            git update-ref refs/remotes/origin/master HEAD
            
            echo "✅ Updated URLs for Wiki"
          else
            echo "⚡ No URL replacements needed for Wiki"
          fi
          
          # Prevent the mirroring action from overwriting our commits
          git remote set-url origin .

      # pixta-dev/repository-mirroring-action@v1.1.1
      - uses: pixta-dev/repository-mirroring-action@674e65a7d483ca28dafaacba0d07351bdcc8bd75
        with:
          # CRITICAL: Append .wiki.git to the target repository URL
          target_repo_url: git@codeberg.org:richbl/go-ble-sync-cycle.wiki.git
          ssh_private_key: ${{ secrets.CODEBERG_SSH_KEY }}
