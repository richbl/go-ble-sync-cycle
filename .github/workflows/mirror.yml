name: Mirror to Codeberg
on: [push, delete]
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      # ── DIAGNOSTIC STEP 1 ───────────────────────────────────────────────────
      # Inspect the repo state BEFORE any replacement. Check the Actions log
      # output here to confirm:
      #   - README.md and wiki/ exist and are git-tracked
      #   - The target URL is actually present in those files
      - name: DEBUG - Pre-replacement state
        run: |
          echo "════════════════════════════════════════"
          echo " Git refs and log"
          echo "════════════════════════════════════════"
          git log --oneline -5
          echo ""
          git branch -avv
          echo ""

          echo "════════════════════════════════════════"
          echo " Git status (are markdown files tracked?)"
          echo "════════════════════════════════════════"
          git status
          echo ""

          echo "════════════════════════════════════════"
          echo " README.md — GitHub URL occurrences"
          echo "════════════════════════════════════════"
          if [ -f README.md ]; then
            grep -n "github.com/richbl/go-ble-sync-cycle" README.md \
              && echo "(matches above)" \
              || echo "  *** NO MATCHES FOUND in README.md ***"
          else
            echo "  *** README.md does not exist ***"
          fi
          echo ""

          echo "════════════════════════════════════════"
          echo " wiki/ — GitHub URL occurrences"
          echo "════════════════════════════════════════"
          if [ -d wiki ]; then
            echo "Files in wiki/:"
            ls -1 wiki/
            echo ""
            grep -rn "github.com/richbl/go-ble-sync-cycle" wiki/ \
              && echo "(matches above)" \
              || echo "  *** NO MATCHES FOUND in wiki/ ***"
          else
            echo "  *** wiki/ directory does not exist ***"
          fi

      # ── URL REPLACEMENT ──────────────────────────────────────────────────────
      # Replace GitHub project URLs with Codeberg equivalents in markdown files.
      # Uses git status --porcelain (after staging) rather than git diff --quiet
      # (before staging) for a more reliable change-detection path.
      - name: Replace GitHub URLs with Codeberg URLs in markdown files
        run: |
          GITHUB_URL="https://github.com/richbl/go-ble-sync-cycle"
          CODEBERG_URL="https://codeberg.org/richbl/go-ble-sync-cycle"

          # Replace in README.md (repo root)
          if [ -f README.md ]; then
            sed -i "s|${GITHUB_URL}|${CODEBERG_URL}|g" README.md
            echo "sed applied to README.md"
          fi

          # Replace in all .md files under wiki/ (if the directory exists)
          if [ -d wiki ]; then
            find wiki -name "*.md" \
              -exec sed -i "s|${GITHUB_URL}|${CODEBERG_URL}|g" {} +
            echo "sed applied to wiki/*.md"
          fi

          # Stage everything first, then test for staged changes.
          # This is more reliable than testing git diff before staging.
          git add -A

          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: replace GitHub URLs with Codeberg URLs"
            echo "Replacement commit created."
          else
            echo "No changes staged — nothing to commit."
          fi

      # ── DIAGNOSTIC STEP 2 ───────────────────────────────────────────────────
      # Inspect the repo state AFTER replacement. Check the Actions log here to
      # confirm:
      #   - The replacement commit appears in git log
      #   - The modified file content shows Codeberg URLs
      #   - No GitHub URLs remain
      - name: DEBUG - Post-replacement state
        run: |
          echo "════════════════════════════════════════"
          echo " Git log after replacement"
          echo "════════════════════════════════════════"
          git log --oneline -5
          echo ""

          echo "════════════════════════════════════════"
          echo " Git show (diff of most recent commit)"
          echo "════════════════════════════════════════"
          git show --stat HEAD
          echo ""

          echo "════════════════════════════════════════"
          echo " README.md — remaining GitHub URL check"
          echo "════════════════════════════════════════"
          if [ -f README.md ]; then
            grep -n "github.com/richbl/go-ble-sync-cycle" README.md \
              && echo "  *** GITHUB URLs STILL PRESENT — replacement failed ***" \
              || echo "  OK: no GitHub URLs found"
          fi
          echo ""

          echo "════════════════════════════════════════"
          echo " wiki/ — remaining GitHub URL check"
          echo "════════════════════════════════════════"
          if [ -d wiki ]; then
            grep -rn "github.com/richbl/go-ble-sync-cycle" wiki/ \
              && echo "  *** GITHUB URLs STILL PRESENT — replacement failed ***" \
              || echo "  OK: no GitHub URLs found in wiki/"
          fi

      # pixta-dev/repository-mirroring-action@v1.1.1
      - uses: pixta-dev/repository-mirroring-action@674e65a7d483ca28dafaacba0d07351bdcc8bd75
        with:
          target_repo_url: git@codeberg.org:richbl/go-ble-sync-cycle.git
          ssh_private_key: ${{ secrets.CODEBERG_SSH_KEY }}
