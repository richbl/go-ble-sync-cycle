name: Mirror to Codeberg
on: [push, delete]
jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      # Suppress the Node.js 20 deprecation warning for pinned actions/checkout
      # without requiring a SHA change (per GitHub's recommended interim path).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      # Replace GitHub project URLs with Codeberg equivalents in markdown files,
      # then advance refs/remotes/origin/<branch> to our modified HEAD.
      #
      # Why the update-ref step is required:
      #   The pixta-dev mirror action pushes refs/remotes/origin/* → Codeberg
      #   refs/heads/* (not the local refs/heads/* branch). Our replacement
      #   commit lives on refs/heads/<branch>, so without advancing the remote
      #   tracking ref the mirror action would push the unmodified GitHub commit
      #   to Codeberg and the URL replacement would be silently discarded.
      - name: Replace GitHub URLs with Codeberg URLs in markdown files
        run: |
          GITHUB_URL="https://github.com/richbl/go-ble-sync-cycle"
          CODEBERG_URL="https://codeberg.org/richbl/go-ble-sync-cycle"

          # Replace in README.md (repo root)
          [ -f README.md ] && \
            sed -i "s|${GITHUB_URL}|${CODEBERG_URL}|g" README.md

          # Replace in all .md files under wiki/ (if the directory exists)
          if [ -d wiki ]; then
            find wiki -name "*.md" \
              -exec sed -i "s|${GITHUB_URL}|${CODEBERG_URL}|g" {} +
          fi

          # Stage and commit if any files changed.
          git add -A
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: replace GitHub URLs with Codeberg URLs"

            # Advance refs/remotes/origin/<branch> to our modified HEAD.
            # The mirror action maps refs/remotes/origin/* → Codeberg
            # refs/heads/*, so this ref must include our replacement commit
            # or the mirror will push the original unmodified content instead.
            CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
            git update-ref refs/remotes/origin/${CURRENT_BRANCH} HEAD
          fi

      # pixta-dev/repository-mirroring-action@v1.1.1
      - uses: pixta-dev/repository-mirroring-action@674e65a7d483ca28dafaacba0d07351bdcc8bd75
        with:
          target_repo_url: git@codeberg.org:richbl/go-ble-sync-cycle.git
          ssh_private_key: ${{ secrets.CODEBERG_SSH_KEY }}
